<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recall - Intelligent Image Search</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
            --surface: #1e1e1e;
            --surface-hover: #2a2a2a;
            --border-color: #333333;
            --primary: #3b82f6;
            --accent: #10b981;
            --transition: 0.3s ease;
        }

        [data-theme="light"] {
            --bg-color: #f8fafc;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --surface: #ffffff;
            --surface-hover: #f1f5f9;
            --border-color: #e2e8f0;
            --primary: #2563eb;
            --accent: #059669;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background var(--transition), color var(--transition);
        }

        /* Top Bar */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
        }

        .logo {
            display: flex;
            align-items: center;
            font-size: 20px;
            font-weight: 700;
            gap: 12px;
            letter-spacing: -0.5px;
        }

        .logo svg {
            width: 24px;
            height: 24px;
            color: var(--primary);
        }

        .topbar-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .user-pill {
            background: var(--surface-hover);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            transition: var(--transition);
        }

        .user-pill:hover {
            border-color: var(--primary);
        }

        .upload-btn:hover {
            background: var(--primary) !important;
            color: white !important;
        }

        .icon-btn {
            background: var(--surface);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .icon-btn:hover {
            background: var(--surface-hover);
        }

        /* Main Center Area */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 40px 100px;
            width: 100%;
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 15vh;
            text-align: center;
        }

        .empty-state .icon {
            font-size: 50px;
            margin-bottom: 24px;
            filter: drop-shadow(0px 4px 10px rgba(0, 0, 0, 0.2));
            user-select: none;
        }

        .empty-state h2 {
            margin: 0 0 12px 0;
            font-size: 24px;
            font-weight: 600;
        }

        .empty-state p {
            margin: 0;
            color: var(--text-secondary);
            font-size: 15px;
        }

        /* Results Grid */
        .results {
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        .card {
            background: var(--surface);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }

        .btn-delete-card {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            border: none;
            color: white;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s, transform 0.1s;
        }

        .card:hover .btn-delete-card {
            opacity: 1;
        }

        .btn-delete-card:hover {
            background: rgba(239, 68, 68, 0.9);
            transform: scale(1.1);
        }

        .card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }

        .card-body {
            padding: 16px;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-visual {
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
        }

        .badge-text {
            background: rgba(236, 72, 153, 0.1);
            color: #ec4899;
        }

        .badge-uploaded {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
        }

        .score-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .text-preview {
            font-size: 13px;
            color: var(--text-secondary);
            max-height: 50px;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 12px;
            background: rgba(128, 128, 128, 0.05);
            border-radius: 8px;
            line-height: 1.4;
        }

        /* Bottom Controls */
        .bottom-controls {
            position: fixed;
            bottom: 30px;
            left: 30px;
            right: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
            z-index: 50;
        }

        .bottom-controls>* {
            pointer-events: auto;
        }

        .fab {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: var(--transition);
            border: none;
            outline: none;
        }

        [data-theme="light"] .fab {
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .fab-trash {
            background: var(--surface);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .fab-trash:hover {
            color: #ef4444;
            background: var(--surface-hover);
        }

        .fab-add {
            background: var(--text-primary);
            color: var(--bg-color);
            font-size: 28px;
            font-weight: 300;
        }

        .fab-add:hover {
            transform: scale(1.05);
        }

        .search-container {
            flex: 1;
            display: flex;
            justify-content: center;
            padding: 0 20px;
        }

        .search-bar {
            display: flex;
            align-items: center;
            background: var(--surface);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            padding: 10px 24px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            transition: var(--transition);
        }

        .search-bar:focus-within {
            border-color: var(--primary);
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.15);
        }

        .search-bar input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            padding: 4px 0;
            margin-left: 14px;
        }

        /* Modals */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: var(--transition);
            z-index: 1000;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal {
            background: var(--surface);
            border-radius: 24px;
            padding: 32px;
            width: 90%;
            max-width: 500px;
            border: 1px solid var(--border-color);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: scale(0.95);
            transition: transform 0.3s;
        }

        .modal-overlay.active .modal {
            transform: scale(1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-header h3 {
            margin: 0;
            font-size: 20px;
            font-weight: 700;
        }

        .modal-close {
            background: var(--surface-hover);
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal-close:hover {
            color: var(--text-primary);
        }

        .drop-zone {
            border: 1px dashed var(--border-color);
            background: var(--surface-hover);
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            position: relative;
            transition: var(--transition);
        }

        .drop-zone:hover,
        .drop-zone.dragover {
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.05);
        }

        .drop-zone input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        /* Trash */
        .trash-item {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
        }

        .trash-actions {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: 0.2s;
        }

        .trash-item:hover .trash-actions {
            opacity: 1;
        }

        .trash-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }

        .trash-btn:hover {
            filter: brightness(1.1);
        }

        .status-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .loading-box {
            background: var(--surface);
            padding: 30px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            color: white;
            width: 80%;
            max-width: 300px;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid var(--border-color);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Full Image Modal */
        #imageModal .modal {
            max-width: 90vw;
            max-height: 90vh;
            background: transparent;
            border: none;
            box-shadow: none;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        #imageModal img {
            max-width: 100%;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }
    </style>
</head>

<body>
    <!-- Top Nav -->
    <div class="topbar">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
            </svg>
            Recall
        </div>
        <div class="topbar-actions">
            <div class="user-pill" id="userDisplay" style="display:none; cursor:pointer;" onclick="logout()" title="Click to log out"></div>
            <button id="themeToggle" class="icon-btn">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"
                    stroke-linecap="round" stroke-linejoin="round" class="moon-icon">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </div>
    </div>

    <!-- Main Area -->
    <div class="main-content">
        <div class="empty-state" id="emptyState" style="display:none;">
            <div class="icon">🔍</div>
            <h2>No images found</h2>
            <p>Upload some memories or try a different search.</p>
        </div>
        <div class="results" id="resultsContainer"></div>
    </div>

    <!-- Bottom Actions -->
    <div class="bottom-controls">
        <button class="fab fab-trash" id="openTrashBtn">
            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"
                stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            </svg>
        </button>

        <div class="search-container">
            <form id="searchForm" class="search-bar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="18" height="18" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="searchInput" placeholder="Search — 'receipt', 'dog'" autocomplete="off">
            </form>
        </div>

        <button class="fab fab-add" id="openAddBtn">+</button>
    </div>

    <!-- Modals -->

    <!-- Login Modal -->
    <div class="modal-overlay" id="loginModal" style="background: var(--bg-color);">
        <div class="modal" style="max-width: 400px; padding: 40px; text-align: center;">
            <h2 style="margin-top: 0; font-size: 24px; font-weight: 700;">Sign in</h2>
            <p style="color: var(--text-secondary); font-size: 14px; margin-bottom: 24px;">Automatically stores images
                securely to your account</p>

            <form id="loginForm" style="display: flex; flex-direction: column; gap: 15px;">
                <input type="email" id="loginEmail" placeholder="Email Address" required
                    style="padding: 12px 16px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--surface-hover); color: var(--text-primary); outline: none;">
                <input type="password" id="loginPassword" placeholder="Password" required
                    style="padding: 12px 16px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--surface-hover); color: var(--text-primary); outline: none;">
                <button type="submit"
                    style="background: var(--primary); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s;">Login
                    / Auto Sign up</button>
            </form>
            <div id="loginError" style="color: #ef4444; font-size: 13px; margin-top: 15px; display: none;"></div>
        </div>
    </div>

    <!-- Add Image Modal -->
    <div class="modal-overlay" id="addModal" onclick="if(event.target===this)closeModal('addModal')">
        <div class="modal">
            <div class="modal-header">
                <h3>Add Images</h3>
                <button class="modal-close" onclick="closeModal('addModal')">&times;</button>
            </div>
            <div class="drop-zone" id="dropZone">
                <input type="file" id="imageInput" accept="image/*" multiple title="">
                <div style="font-size: 32px; margin-bottom: 12px;">📁</div>
                <p style="margin: 0 0 8px 0; font-weight: 600;">Drop images here</p>
                <span style="font-size: 12px; color: var(--text-secondary);">PNG, JPG, GIF, WEBP</span>
            </div>
            
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button type="button" class="upload-btn" onclick="startCamera()" style="flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--surface-hover); color: var(--text-primary); cursor: pointer; transition: 0.2s;">📷 Camera</button>
                <button type="button" class="upload-btn" onclick="loadGooglePicker()" style="flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--surface-hover); color: var(--text-primary); cursor: pointer; transition: 0.2s;">☁️ Drive</button>
            </div>
            <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;" onchange="handleUpload(this.files)">
            <input type="file" id="driveInput" accept="image/*" multiple style="display:none;" onchange="handleUpload(this.files)">
        </div>
    </div>

    <!-- Camera Modal -->
    <div class="modal-overlay" id="cameraModal" onclick="if(event.target===this)closeCamera()">
        <div class="modal" style="display: flex; flex-direction: column; align-items: center; max-width: 500px;">
            <div class="modal-header" style="width: 100%;">
                <h3>Take a Photo</h3>
                <button class="modal-close" onclick="closeCamera()">&times;</button>
            </div>
            <div style="position: relative; width: 100%; border-radius: 12px; overflow: hidden; background: #000; display: flex; justify-content: center; margin-bottom: 20px;">
                <video id="cameraWebcam" style="width: 100%; max-height: 400px; display: none;" autoplay playsinline></video>
            </div>
            <button onclick="capturePhoto()" class="upload-btn" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--primary); color: white; cursor: pointer; transition: 0.2s; font-size: 16px; border: none; font-weight: 600;">📸 Capture & Upload</button>
            <canvas id="cameraCanvas" style="display: none;"></canvas>
        </div>
    </div>

    <!-- Trash Modal -->
    <div class="modal-overlay" id="trashModal" onclick="if(event.target===this)closeModal('trashModal')">
        <div class="modal" style="max-width: 440px;">
            <div class="modal-header">
                <h3 style="display: flex; align-items: center; gap: 10px;">Trash</h3>
                <div>
                    <button class="trash-btn"
                        style="background: transparent; color: #ef4444; border: 1px solid #ef4444;"
                        onclick="emptyTrash()">Empty Trash</button>
                    <button class="modal-close" style="display: inline-flex; margin-left: 10px;"
                        onclick="closeModal('trashModal')">&times;</button>
                </div>
            </div>
            <div class="trash-content" style="text-align: center; padding: 20px 0;"></div>
        </div>
    </div>

    <!-- Lightbox Modal -->
    <div class="modal-overlay" id="imageModal" onclick="if(event.target===this)closeModal('imageModal')">
        <div class="modal">
            <button class="modal-close"
                style="position:absolute; top:-40px; right:0; background:transparent; color:white; font-size: 30px;"
                onclick="closeModal('imageModal')">&times;</button>
            <img id="fullImage" src="" alt="Full view">
        </div>
    </div>

    <!-- Loader -->
    <div class="status-overlay" id="loadingStatus">
        <div class="loading-box">
            <div class="spinner"></div>
            <span id="loadingText" style="font-weight: 600;">Processing...</span>
            <div style="width: 100%; background: var(--surface-hover); height: 8px; border-radius: 4px; overflow: hidden; margin-top: 5px; display: none;"
                id="progressContainer">
                <div id="progressBar"
                    style="width: 0%; height: 100%; background: var(--primary); transition: width 0.3s;"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://shivpratap46-recall-backend.hf.space';

        // Dark Mode Logic
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            themeToggle.innerHTML = newTheme === 'light'
                ? `<svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="4.22" x2="19.78" y2="5.64"></line></svg>`
                : `<svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>`;
        });

        // Basic Utils
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function openLightbox(url) { document.getElementById('fullImage').src = url; openModal('imageModal'); }
        function toggleEmptyState(show) {
            document.getElementById('emptyState').style.display = show ? 'flex' : 'none';
            document.getElementById('resultsContainer').style.display = show ? 'none' : 'grid';
        }
        function showStatus(text, progress = false) {
            document.getElementById('loadingText').innerText = text;
            document.getElementById('progressContainer').style.display = progress ? 'block' : 'none';
            document.getElementById('loadingStatus').style.display = 'flex';
        }
        function updateProgress(p) { document.getElementById('progressBar').style.width = p + '%'; }
        function hideStatus() { document.getElementById('loadingStatus').style.display = 'none'; }

        // Login Logic
        const UID = () => localStorage.getItem('recall_user_id');

        function logout() {
            if (!confirm("Are you sure you want to log out?")) return;
            localStorage.removeItem('recall_user_id');
            localStorage.removeItem('recall_user_email');
            document.getElementById('userDisplay').style.display = 'none';
            document.getElementById('userDisplay').innerText = '';
            document.getElementById('resultsContainer').innerHTML = '';
            toggleEmptyState(true);
            
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginPassword').value = '';
            document.getElementById('loginError').style.display = 'none';
            document.getElementById('loginModal').classList.add('active');
        }

        window.onload = () => {
            if (!UID()) {
                document.getElementById('loginModal').classList.add('active');
            } else {
                document.getElementById('userDisplay').style.display = 'block';
                document.getElementById('userDisplay').innerText = localStorage.getItem('recall_user_email');
                loadGallery();
            }
        };

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            try {
                const res = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('recall_user_id', data.user_id);
                    localStorage.setItem('recall_user_email', data.email);
                    document.getElementById('userDisplay').style.display = 'block';
                    document.getElementById('userDisplay').innerText = data.email;
                    closeModal('loginModal');
                    loadGallery();
                } else {
                    document.getElementById('loginError').innerText = data.detail;
                    document.getElementById('loginError').style.display = 'block';
                }
            } catch (e) { console.error(e); }
        });

        // Render standard cards
        function renderCards(results) {
            const container = document.getElementById('resultsContainer');
            if (!results || results.length === 0) { toggleEmptyState(true); return; }
            toggleEmptyState(false);

            let html = '';
            results.forEach(res => {
                let badge = res.text_score !== undefined
                    ? `<span class="badge ${res.text_score > res.visual_score ? 'badge-text' : 'badge-visual'}">${res.text_score > res.visual_score ? 'OCR Match' : 'Visual Match'}</span>`
                    : `<span class="badge badge-uploaded">Gallery</span>`;
                let conf = res.score !== undefined ? `<div class="score-row"><span>Confidence:</span><strong style="color:var(--text-primary)">${(res.score * 100).toFixed(1)}%</strong></div>` : '';

                html += `
                <div class="card" id="card-${res.file_id}">
                    <button class="btn-delete-card" onclick="deleteImage(event, '${res.file_id}')" title="Move to Trash">
                        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    </button>
                    <img src="${API_URL}${res.url}" onclick="openLightbox('${API_URL}${res.url}')" style="cursor: pointer;">
                    <div class="card-body">
                        ${badge}
                        ${conf}
                        <div class="text-preview"><strong>Extracted Text:</strong><br>${res.text_found || '<i>None</i>'}</div>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        async function loadGallery() {
            showStatus('Loading gallery...');
            try {
                const res = await fetch(`${API_URL}/gallery?user_id=${UID()}`);
                const data = await res.json();
                renderCards(data.results);
            } catch (e) { console.error(e); }
            finally { hideStatus(); }
        }

        // Upload
        document.getElementById('openAddBtn').addEventListener('click', () => openModal('addModal'));
        const dropZone = document.getElementById('dropZone');
        const imgInput = document.getElementById('imageInput');

        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); handleUpload(e.dataTransfer.files); });
        imgInput.addEventListener('change', e => handleUpload(e.target.files));

        function handleUpload(files) {
            if (!files.length) return;
            closeModal('addModal');
            showStatus(`Uploading ${files.length} images...`, true);
            updateProgress(0);

            const fd = new FormData();
            for (let i = 0; i < files.length; i++) {
                fd.append('files', files[i]);
            }
            fd.append('user_id', UID());

            const xhr = new XMLHttpRequest();
            xhr.open('POST', `${API_URL}/upload`, true);

            xhr.upload.onprogress = function (e) {
                if (e.lengthComputable) {
                    const percent = Math.round((e.loaded / e.total) * 100);
                    // Allocate 0-90% for upload network transfer
                    updateProgress(percent * 0.9);

                    if (percent === 100) {
                        showStatus(`Processing ${files.length} images... (AI Scanning)`, true);
                    } else {
                        showStatus(`Uploading ${files.length} images... ${percent}%`, true);
                    }
                }
            };

            xhr.onload = function () {
                updateProgress(100);
                if (xhr.status >= 200 && xhr.status < 300) {
                    showStatus('Syncing... Please wait.', true);
                    setTimeout(() => {
                        loadGalleryRetry(0);
                        document.getElementById('searchInput').value = '';
                    }, 800);
                } else {
                    hideStatus();
                    alert("Upload failed. Server error.");
                }
            };

            xhr.onerror = function () {
                console.error("Upload failed network error");
                hideStatus();
            };

            xhr.send(fd);
            imgInput.value = '';
        }

        async function loadGalleryRetry(retryCount) {
            try {
                const res = await fetch(`${API_URL}/gallery?user_id=${UID()}`);
                if (!res.ok) throw new Error("Server not up");
                const data = await res.json();
                renderCards(data.results);
                hideStatus();
            } catch (e) {
                if (retryCount < 5) {
                    setTimeout(() => loadGalleryRetry(retryCount + 1), 500);
                } else {
                    console.error("Failed to sync after upload", e);
                    hideStatus();
                }
            }
        }

        // Search
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', e => { if (!e.target.value.trim()) loadGallery(); });

        document.getElementById('searchForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const q = searchInput.value.trim();
            if (!q) return loadGallery();

            showStatus('Searching...');
            try {
                const res = await fetch(`${API_URL}/search?query=${encodeURIComponent(q)}&top_k=20&user_id=${UID()}`);
                const data = await res.json();
                const valid = (data.results || []).filter(r => (r.text_score > r.visual_score) || r.visual_score >= 0.23);
                renderCards(valid);
            } catch (e) { console.error(e); toggleEmptyState(true); }
            finally { hideStatus(); }
        });

        // Trash & Delete
        async function deleteImage(event, fileId) {
            event.stopPropagation();
            try {
                const res = await fetch(`${API_URL}/trash/${fileId}`, { method: 'POST' });
                if (res.ok) {
                    const card = document.getElementById(`card-${fileId}`);
                    if (card) {
                        card.remove(); // Instantly disappear 
                    }
                    if (document.getElementById('resultsContainer').children.length === 0) toggleEmptyState(true);
                }
            } catch (e) { }
        }

        document.getElementById('openTrashBtn').addEventListener('click', () => { openModal('trashModal'); loadTrash(); });

        async function loadTrash() {
            const tc = document.querySelector('.trash-content');
            tc.innerHTML = '<div class="spinner" style="margin:20px auto;"></div>';
            try {
                const res = await fetch(`${API_URL}/trash?user_id=${UID()}`);
                const data = await res.json();
                if (data.results && data.results.length) {
                    let html = `<div style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px; max-height:400px; overflow-y:auto; padding-right:5px;">`;
                    data.results.forEach(i => {
                        html += `
                        <div class="trash-item" id="trash-${i.file_id}">
                            <img src="${API_URL}${i.url}" style="width:100%; height:90px; object-fit:cover; display:block;">
                            <div class="trash-actions" style="flex-direction: column; gap: 8px;">
                                <button class="trash-btn" style="width: 80%;" onclick="restoreImage('${i.file_id}')">Restore</button>
                                <button class="trash-btn" style="width: 80%; background: #ef4444;" onclick="permanentlyDeleteImage('${i.file_id}')">Delete</button>
                            </div>
                        </div>`;
                    });
                    tc.innerHTML = html + `</div>`;
                } else {
                    tc.innerHTML = `<div style="font-size:40px; margin-bottom:10px;">🧹</div><p>Trash is empty</p>`;
                }
            } catch (e) { tc.innerHTML = '<p>Error loading trash</p>'; }
        }

        async function restoreImage(fileId) {
            try {
                const res = await fetch(`${API_URL}/restore/${fileId}`, { method: 'POST' });
                if (res.ok) {
                    const el = document.getElementById(`trash-${fileId}`);
                    if (el) el.remove();
                    // Just reload gallery underneath, it feels seamless
                    loadGallery();
                    if (document.querySelector('.trash-content .trash-item') === null) loadTrash();
                }
            } catch (e) { }
        }

        async function permanentlyDeleteImage(fileId) {
            if (!confirm("Permanently delete this image?")) return;
            try {
                const res = await fetch(`${API_URL}/trash/delete/${fileId}`, { method: 'POST' });
                if (res.ok) {
                    const el = document.getElementById(`trash-${fileId}`);
                    if (el) el.remove();
                    if (document.querySelector('.trash-content .trash-item') === null) loadTrash();
                }
            } catch (e) { }
        }

        async function emptyTrash() {
            if (!confirm("Permanently scrub these images from the server Database? This cannot be undone.")) return;
            try { await fetch(`${API_URL}/empty-trash?user_id=${UID()}`, { method: 'POST' }); loadTrash(); }
            catch (e) { }
        }

        // Camera Logic
        let cameraStream = null;

        async function startCamera() {
            closeModal('addModal');
            openModal('cameraModal');
            const video = document.getElementById('cameraWebcam');
            video.style.display = 'block';
            try {
                cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = cameraStream;
            } catch (e) {
                alert("Camera access denied or unavailable.");
                closeCamera();
            }
        }

        function closeCamera() {
            closeModal('cameraModal');
            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
                cameraStream = null;
            }
        }

        function capturePhoto() {
            const video = document.getElementById('cameraWebcam');
            const canvas = document.getElementById('cameraCanvas');
            if (!cameraStream) return;

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            canvas.toBlob((blob) => {
                closeCamera();
                const file = new File([blob], `photo_${Date.now()}.png`, { type: "image/png" });
                const list = new DataTransfer();
                list.items.add(file);
                handleUpload(list.files);
            }, "image/png");
        }

        // Google Drive Picker Logic
        const DRIVE_CLIENT_ID = 'PLACEHOLDER_CLIENT_ID';
        const DRIVE_APP_ID = 'PLACEHOLDER_APP_ID';
        const DRIVE_API_KEY = 'PLACEHOLDER_API_KEY';
        const SCOPES = 'https://www.googleapis.com/auth/drive.readonly';
        let driveOauthToken = null;

        function loadGooglePicker() {
            if(DRIVE_CLIENT_ID === 'PLACEHOLDER_CLIENT_ID') {
                alert("Google Drive integration requires a Google Cloud Client ID & API Key!\n\nDeveloper: To make this Drive popup function correctly, please follow Google Picker API documentation to issue your credentials and replace 'PLACEHOLDER_CLIENT_ID' in index.html, otherwise the Google Picker framework cannot authorize the local domain.");
                return;
            }
            
            showStatus("Loading Drive Picker...");
            const script = document.createElement('script');
            script.src = "https://apis.google.com/js/api.js";
            script.onload = () => {
                gapi.load('auth', {'callbacks': {'auth': initDriveAuth}});
                gapi.load('picker', {'callbacks': {'picker': () => {console.log("Picker loaded");}}});
            };
            document.body.appendChild(script);
        }

        function initDriveAuth() {
            gapi.auth.authorize({
                'client_id': DRIVE_CLIENT_ID,
                'scope': SCOPES,
                'immediate': false
            }, handleDriveAuthResult);
        }

        function handleDriveAuthResult(authResult) {
            hideStatus();
            if (authResult && !authResult.error) {
                driveOauthToken = authResult.access_token;
                createPicker();
            } else {
                alert("Google Drive authorization failed.");
            }
        }

        function createPicker() {
            if (driveOauthToken) {
                const view = new google.picker.View(google.picker.ViewId.DOCS);
                view.setMimeTypes("image/png,image/jpeg,image/jpg,image/webp,image/gif");
                
                const picker = new google.picker.PickerBuilder()
                    .enableFeature(google.picker.Feature.NAV_HIDDEN)
                    .enableFeature(google.picker.Feature.MULTISELECT_ENABLED)
                    .setAppId(DRIVE_APP_ID)
                    .setOAuthToken(driveOauthToken)
                    .addView(view)
                    .setDeveloperKey(DRIVE_API_KEY)
                    .setCallback(pickerCallback)
                    .build();
                 picker.setVisible(true);
            }
        }

        async function pickerCallback(data) {
            if (data.action == google.picker.Action.PICKED) {
                const docs = data.docs;
                showStatus(`Downloading ${docs.length} files from Drive...`, true);
                
                const dataTransfer = new DataTransfer();
                for(let i=0; i<docs.length; i++) {
                    const doc = docs[i];
                    try {
                        const url = `https://www.googleapis.com/drive/v3/files/${doc.id}?alt=media`;
                        const res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + driveOauthToken } });
                        const blob = await res.blob();
                        const file = new File([blob], doc.name, {type: doc.mimeType || "image/jpeg"});
                        dataTransfer.items.add(file);
                    } catch(e) { }
                }
                
                hideStatus();
                if(dataTransfer.files.length > 0) handleUpload(dataTransfer.files);
                else alert("Failed to download selected items from Drive.");
            }
        }
    </script>
</body>
</html>
